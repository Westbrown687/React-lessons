<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function App() {
        const count = React.useState(0);
        const [counter, setCount] = count;
        return (
          <>
            <TextDisplay counter={counter} setCount={setCount} />
            <TextDisplay counter={counter} setCount={setCount} />
          </>
        );
      }

      function TextDisplay({ counter, setCount }) {
        function clicked() {
          setCount(counter + 1);
        }

        const single = "time";
        const multiple = "times";

        function resetDisplay() {
          setCount(0);
        }

        return (
          <>
            <button onClick={clicked}>
              Clicked {counter} {counter === 1 ? single : multiple}
            </button>
            <button onClick={resetDisplay}>Reset</button>
          </>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
