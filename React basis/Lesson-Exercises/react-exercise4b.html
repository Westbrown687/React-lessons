<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .email-input,
      .password-input {
        padding: 10px 15px;
        margin-bottom: 20px;
        border-radius: 7px;
        border-style: solid;
        width: 280px;
      }
      .Login-button,
      .signup-button {
        padding: 10px 15px;
        margin-right: 10px;
        background-color: rgb(24, 129, 234);
        border-radius: 6px;
        border: none;
        color: white;
      }
      .hide-button {
        margin-left: 20px;
        padding: 4px 10px;
        border-radius: 5px;
        border-style: solid;
        border-width: 1px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function App() {
        return (
          <>
            <TextDisplay />
          </>
        );
      }

      function TextDisplay() {
        const text = React.useState(true);

        const [textHidden, textNotHidden] = text;

        function textView() {
          {
            textHidden ? textNotHidden(false) : textNotHidden(true);
          }
        }

        return (
          <>
            <div>
              <input
                type="email"
                placeholder="Email"
                size="30"
                className="email-input"
              />
            </div>
            <div>
              <input
                type={textHidden ? "password" : "text"}
                placeholder="Password"
                size="30"
                className="password-input"
              />

              <button className="hide-button" onClick={textView}>
                {textHidden ? "Hide" : "Show"}
              </button>
            </div>

            <div>
              <button className="Login-button">Login</button>
              <button className="signup-button">Sign Up</button>
            </div>
          </>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
