<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function App() {
        return (
          <>
            <ProductDetails
              name="Cotton socks"
              price="10.90"
              discountedPrice="5.45"
            />
            <ProductDetails name="Tennis balls" price="6.00" />
            <ProductDetails name="Plain T-Shirt" price="7.99" />
          </>
        );
      }

      function ProductDetails({ name, price, discountedPrice }) {
        if (discountedPrice) {
          return (
            <>
              <p>{name}</p>
              {discountedPrice ? (
                <>
                  <p>
                    <del>Price: ${price}</del>
                  </p>
                  <p>Discount price: ${discountedPrice}</p>
                </>
              ) : (
                <p>Price: ${price}</p>
              )}
              <button>Add to Cart</button>
            </>
          );
        }
        return (
          <>
            <p>{name}</p>
            <p>Price: ${price}</p>
            <button>Add to Cart</button>
          </>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>

    <script src="react-basics.js"></script>
  </body>
</html>
